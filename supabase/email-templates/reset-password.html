<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cambiá tu contraseña de B-Side</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 24px;
      background: #06070d;
      color: #f5f5f7;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="max-width: 560px; margin: 0 auto"
    >
      <tr>
        <td
          style="
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 24px;
            background: #0b1020;
            padding: 32px;
          "
        >
          <p
            style="
              margin: 0 0 12px;
              color: #c4b5fd;
              font-size: 12px;
              font-weight: 700;
              letter-spacing: 1.4px;
            "
          >
            B-SIDE
          </p>
          <h1 style="margin: 0 0 16px; font-size: 28px; line-height: 1.2">
            Cambiá tu contraseña
          </h1>
          <p style="margin: 0 0 24px; color: #d1d5db; font-size: 16px; line-height: 1.6">
            Si pediste recuperar tu acceso, seguí este enlace para elegir una contraseña nueva.
          </p>
          <a
            href="{{ .ConfirmationURL }}"
            style="
              display: inline-block;
              padding: 14px 22px;
              border-radius: 999px;
              background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
              color: #ffffff;
              text-decoration: none;
              font-weight: 700;
            "
          >
            Cambiar contraseña
          </a>
          <p style="margin: 24px 0 0; color: #9ca3af; font-size: 14px; line-height: 1.6">
            Si no pediste este cambio, podés ignorar este mensaje.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
